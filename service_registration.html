<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>농협 AI 서비스 제안서 예시 화면</title>
    <!-- 폴더 구조에 맞춘 스타일 경로 수정 -->
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/registration.css">
</head>
<body>

    <!-- 고정 상단 영역 (Top Area) -->
    <header>
        <div class="logo-area">
            <a href="index.html" class="logo-link">
                <img src="assets/img_ci_symbol_d.gif" alt="NH 농협 로고" class="logo-img">
                <span class="logo-text">NH 농협</span>
            </a>
            <div class="service-name-divider"></div>
            <div class="service-name">AI 포털</div>
        </div>
        <div class="user-info">
            <span class="user-dept">농협중앙회 디지털전략부</span>
            <span class="user-name"><strong>관리자</strong>님 안녕하세요</span>
            <button class="logout-btn">로그아웃</button>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <div class="wrapper">
        <div class="main-container">
            <!-- 페이지 타이틀 및 설명 -->
            <div class="page-title-area">
                <h1>서비스 등록 및 구성 관리</h1>
                <p>생성형 AI 서비스를 구성하기 위해 프롬프트, 입출력 템플릿, 처리 로직 템플릿을 선택하여 하나의 서비스를 등록합니다.</p>
            </div>

            <div class="content-wrapper">
                <!-- 왼쪽 입력 폼 -->
                <div class="left-form">
                    <!-- 1. 서비스 기본정보 -->
                    <div class="section">
                        <div class="section-title"><span class="badge">1</span> 서비스 기본정보</div>
                        <table class="form-table">
                            <tr><th>서비스명</th><td colspan="3"><input type="text" value="보고서 초안 작성 서비스"></td></tr>
                            <tr><th>설명</th><td colspan="3"><input type="text" value="주제어 입력 기반 보고서 초안 작성 지원 서비스"></td></tr>
                            <tr>
                                <th>서비스 유형</th>
                                <td><select><option>보고서 작성</option></select></td>
                                <td colspan="2" style="text-align: right;">
                                    <span style="font-size: 13px; color: #666; margin-right: 10px;">owner01</span>
                                    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <!-- 2. 프롬프트 선택 -->
                    <div class="section">
                        <div class="section-title"><span class="badge">2</span> 프롬프트 선택</div>
                        <table class="form-table">
                            <tr>
                                <td><select><option>프롬프트 템플릿 선택</option></select></td>
                                <td style="width: 150px;"><button class="btn-config">⚙ 프롬프트 상세 관리</button></td>
                            </tr>
                        </table>
                    </div>

                    <!-- 3. 입력값 및 처리 로직 선택 -->
                    <div class="section">
                        <div class="section-title"><span class="badge">3</span> 입력값 및 처리 로직 선택</div>
                        <table class="form-table">
                            <tr>
                                <th>입력폼 템플릿 선택</th>
                                <td><select><option>보고서 초안 작성 입력폼 템플릿 #1</option></select></td>
                                <td style="width: 150px;"><button class="btn-config">⚙ 입력폼/처리 관리</button></td>
                            </tr>
                            <tr>
                                <th>처리 로직 템플릿 선택</th>
                                <td><select><option>단순 키워드 기반 보고서 초안 작성 로직</option></select></td>
                                <td><button class="btn-config">⚙ 입력폼/처리 관리</button></td>
                            </tr>
                        </table>
                    </div>

                    <!-- 4. 외부 LLM API 연계 구성 선택 -->
                    <div class="section">
                        <div class="section-title"><span class="badge">4</span> 외부 LLM API 연계 구성 선택</div>
                        <table class="form-table">
                            <tr>
                                <th>연계 API 구성 선택</th>
                                <td><select><option>LLM API 구성 #1. OpenAI GPT</option></select></td>
                                <td style="width: 150px;"><button class="btn-config">⚙ LLM API 연계</button></td>
                            </tr>
                        </table>
                    </div>
                </div>

                <!-- 오른쪽 권한 설정 -->
                <div class="right-auth">
                    <div class="section">
                        <div class="section-title"><span class="badge">4</span> 서비스 권한 등록</div>
                        <div class="auth-box">
                            <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">조회 권한 설정</p>
                            <select style="margin-bottom: 20px;"><option>전체 조직</option></select>
                            <div class="org-tree">
                                <div class="tree-item">📂 농협중앙회</div>
                                <div class="tree-item indent-1">└─ 📂 서울지역본부</div>
                                <div class="tree-item indent-2">└─ 📄 강남지점</div>
                            </div>
                        </div>
                    </div>
                    <div class="bottom-buttons">
                        <button class="btn-cancel">취소</button>
                        <button class="btn-submit">서비스 등록</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
